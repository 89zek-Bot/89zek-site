<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>89'zek</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="profile">

        <div class="avatar">

            <img src="assets/avatar.gif" alt="89zek">

            <div class="live">
                🔴 LIVE
            </div>

        </div>

        <h1>89'zek</h1>

        <p>
            Créateur de contenu Gaming 🎮
            <br>
            Bienvenue sur mon univers.
        </p>

        <div class="stats">

            <div class="stat">
                <h2 id="followers">0</h2>
                <span>Twitch</span>
            </div>

            <div class="stat">
                <h2 id="tiktok">0</h2>
                <span>TikTok</span>
            </div>

            <div class="stat">
                <h2 id="likes">0</h2>
                <span>Likes</span>
            </div>

        </div>

    </div>

    <div class="socials">

        <a href="https://www.twitch.tv/89grd" target="_blank" class="card">

            <div class="icon twitch">
                <i class="fa-brands fa-twitch"></i>
            </div>

            <div class="text">
                <h2>Twitch</h2>
                <span>Regarder les lives</span>
            </div>

            <i class="fa-solid fa-chevron-right arrow"></i>

        </a>

        <a href="https://www.tiktok.com/@.89zek" target="_blank" class="card">

            <div class="icon tiktok">
                <i class="fa-brands fa-tiktok"></i>
            </div>

            <div class="text">
                <h2>TikTok</h2>
                <span>Découvrir mes vidéos</span>
            </div>

            <i class="fa-solid fa-chevron-right arrow"></i>

        </a>

        <a href="https://discord.gg/xF2SR28QjK" target="_blank" class="card">

            <div class="icon discord">
                <i class="fa-brands fa-discord"></i>
            </div>

            <div class="text">
                <h2>Discord</h2>
                <span>Rejoindre la communauté</span>
            </div>

            <i class="fa-solid fa-chevron-right arrow"></i>

        </a>

    </div>

</div>

<script src="script.js"></script>

</html>
